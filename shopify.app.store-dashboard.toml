# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "88ce5155d4fe752b0d5d04faed424ea2"
application_url = "https://store-dashboard-t530.onrender.com"
embedded = true
name = "Store_dashboard"

[webhooks]
api_version = "2026-07"

[[webhooks.subscriptions]]
topics = ["orders/create"]
uri = "/webhooks/orders/create"

[[webhooks.subscriptions]]
topics = ["orders/updated"]
uri = "/webhooks/orders/updated"

[[webhooks.subscriptions]]
topics = ["inventory_levels/update"]
uri = "/webhooks/inventory-levels/update"

[[webhooks.subscriptions]]
topics = ["inventory_items/update"]
uri = "/webhooks/inventory-items/update"

[[webhooks.subscriptions]]
topics = ["products/create"]
uri = "/webhooks/products/create"

[[webhooks.subscriptions]]
topics = ["products/update"]
uri = "/webhooks/products/update"

[[webhooks.subscriptions]]
topics = ["products/delete"]
uri = "/webhooks/products/delete"

[access_scopes]
scopes = "read_all_orders,read_inventory,read_orders,read_products,read_locations"

[auth]
redirect_urls = [
  "https://store-dashboard-t530.onrender.com/auth/callback",
  "https://store-dashboard-t530.onrender.com/auth/shopify/callback",
  "https://store-dashboard-t530.onrender.com/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
